<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Script Trainer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f172a;
    --surface:  #1e293b;
    --surface2: #273549;
    --border:   #334155;
    --accent:   #818cf8;
    --accent2:  #6366f1;
    --text:     #f1f5f9;
    --sub:      #94a3b8;
    --muted:    #475569;
    --green:    #34d399;
    --yellow:   #fbbf24;
    --red:      #f87171;
    --green-bg: rgba(52,211,153,.12);
    --yellow-bg:rgba(251,191,36,.12);
    --red-bg:   rgba(248,113,113,.12);
  }

  body {
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── ヘッダー ── */
  header {
    background: rgba(15,23,42,.9);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title {
    font-size: .8rem;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .tab-bar { display: flex; gap: 2px; background: var(--surface); border-radius: 10px; padding: 3px; }
  .tab-btn {
    background: transparent;
    border: none;
    color: var(--sub);
    padding: 5px 14px;
    border-radius: 7px;
    cursor: pointer;
    font-size: .8rem;
    font-weight: 600;
    letter-spacing: .03em;
    transition: all .18s;
  }
  .tab-btn.active { background: var(--surface2); color: var(--text); }

  /* ── ページ ── */
  .page { display: none; padding: 20px 16px; max-width: 680px; margin: 0 auto; }
  .page.active { display: block; }

  /* ── モード選択 ── */
  .mode-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }
  .mode-btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 4px;
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .05em;
    cursor: pointer;
    color: var(--muted);
    text-align: center;
    transition: all .18s;
    text-transform: uppercase;
  }
  .mode-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(129,140,248,.1);
  }

  /* ── カウンター・進捗 ── */
  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .card-counter { font-size: .75rem; font-weight: 600; color: var(--muted); letter-spacing: .06em; }
  .progress-wrap {
    flex: 1;
    margin: 0 12px;
    background: var(--surface2);
    border-radius: 2px;
    height: 3px;
  }
  .progress-bar {
    background: var(--accent);
    height: 100%;
    border-radius: 2px;
    transition: width .3s;
  }

  /* ── カード ── */
  .flip-card {
    perspective: 1200px;
    height: 210px;
    cursor: pointer;
    margin-bottom: 18px;
    user-select: none;
  }
  .flip-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform .5s cubic-bezier(.4,0,.2,1);
  }
  .flip-card.flipped .flip-inner { transform: rotateY(180deg); }

  .flip-front, .flip-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 28px;
  }
  .flip-front {
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .flip-back {
    background: linear-gradient(135deg, #312e81 0%, #4c1d95 100%);
    border: 1px solid rgba(129,140,248,.3);
    transform: rotateY(180deg);
  }
  .card-label {
    font-size: .65rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 14px;
    color: var(--muted);
  }
  .flip-back .card-label { color: rgba(255,255,255,.4); }
  .card-text {
    font-size: 1.15rem;
    font-weight: 500;
    text-align: center;
    line-height: 1.6;
    color: var(--text);
  }
  .flip-back .card-text { color: #fff; }
  .card-hint {
    font-size: .68rem;
    color: var(--muted);
    margin-top: 16px;
    letter-spacing: .04em;
  }
  .flip-back .card-hint { color: rgba(255,255,255,.3); }

  /* ── ナビ ── */
  .controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .ctrl-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--sub);
    transition: all .18s;
  }
  .ctrl-btn svg { width: 16px; height: 16px; fill: currentColor; }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ctrl-btn.play {
    background: var(--accent2);
    border-color: var(--accent2);
    color: white;
    width: 56px;
    height: 56px;
  }
  .ctrl-btn.play svg { width: 20px; height: 20px; }
  .ctrl-btn.play:hover { background: #4f46e5; border-color: #4f46e5; }

  /* ── フィードバック ── */
  .fb-label {
    text-align: center;
    font-size: .68rem;
    color: var(--muted);
    letter-spacing: .05em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .feedback-bar { display: flex; gap: 8px; }
  .fb-btn {
    flex: 1;
    border-radius: 10px;
    padding: 12px 8px;
    font-size: .78rem;
    font-weight: 700;
    letter-spacing: .06em;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: all .18s;
    color: var(--sub);
    text-transform: uppercase;
  }
  .fb-btn .fb-icon {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .7rem;
    font-weight: 900;
  }
  .fb-btn.ok .fb-icon { background: var(--green-bg); color: var(--green); }
  .fb-btn.so .fb-icon { background: var(--yellow-bg); color: var(--yellow); }
  .fb-btn.ng .fb-icon { background: var(--red-bg); color: var(--red); }
  .fb-btn.ok:hover { border-color: var(--green); color: var(--green); background: var(--green-bg); }
  .fb-btn.so:hover { border-color: var(--yellow); color: var(--yellow); background: var(--yellow-bg); }
  .fb-btn.ng:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }

  /* ── リスト ── */
  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .list-title { font-size: .8rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--sub); }
  .add-btn {
    background: var(--accent2);
    color: white;
    border: none;
    padding: 7px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: .78rem;
    font-weight: 700;
    letter-spacing: .06em;
    transition: background .18s;
  }
  .add-btn:hover { background: #4f46e5; }

  .list-filter {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .07em;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--muted);
    transition: all .15s;
  }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(129,140,248,.1); }

  .script-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 6px;
    transition: border-color .15s;
  }
  .script-item:hover { border-color: var(--muted); }
  .script-item-top { display: flex; align-items: flex-start; gap: 10px; }

  /* 苦手度：左ボーダーで表現 */
  .diff-bar {
    width: 3px;
    border-radius: 2px;
    align-self: stretch;
    min-height: 36px;
    flex-shrink: 0;
  }
  .diff-bar.hard  { background: var(--red); }
  .diff-bar.mid   { background: var(--yellow); }
  .diff-bar.easy  { background: var(--green); }
  .diff-bar.none  { background: var(--border); }

  .script-item-body { flex: 1; min-width: 0; }
  .script-en {
    font-weight: 500;
    font-size: .88rem;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .script-ja {
    font-size: .78rem;
    color: var(--sub);
    white-space: normal;
    line-height: 1.4;
  }
  .item-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 7px;
    width: 30px;
    height: 30px;
    cursor: pointer;
    font-size: .78rem;
    font-weight: 700;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }
  .icon-btn:hover { border-color: var(--sub); color: var(--text); }
  .icon-btn.del:hover { border-color: var(--red); color: var(--red); }

  /* スコアバッジ */
  .score-row { display: flex; gap: 6px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
  .score-badge {
    font-size: .68rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: .05em;
    text-transform: uppercase;
  }
  .score-badge.ok   { background: var(--green-bg);  color: var(--green); }
  .score-badge.so   { background: var(--yellow-bg); color: var(--yellow); }
  .score-badge.ng   { background: var(--red-bg);    color: var(--red); }
  .score-badge.none { background: var(--surface2);  color: var(--muted); }
  .score-badge.fast { background: rgba(129,140,248,.15); color: var(--accent); }
  .score-badge.slow { background: var(--surface2);  color: var(--sub); }

  /* ── モーダル ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 460px;
    box-shadow: 0 24px 64px rgba(0,0,0,.5);
  }
  .modal h3 { font-size: .8rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--sub); margin-bottom: 18px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: .72rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .form-group textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: .9rem;
    font-family: inherit;
    color: var(--text);
    resize: vertical;
    outline: none;
    transition: border-color .18s;
  }
  .form-group textarea::placeholder { color: var(--muted); }
  .form-group textarea:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .btn-cancel { background: var(--surface2); border: 1px solid var(--border); color: var(--sub); padding: 9px 18px; border-radius: 8px; cursor: pointer; font-size: .8rem; font-weight: 600; }
  .btn-save { background: var(--accent2); color: white; border: none; padding: 9px 18px; border-radius: 8px; cursor: pointer; font-size: .8rem; font-weight: 700; letter-spacing: .04em; }

  /* 空状態 */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 2rem; margin-bottom: 12px; opacity: .4; }
  .empty p { font-size: .85rem; line-height: 1.6; }

  /* ── 設定 ── */
  .setting-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
  .setting-section-title { font-size: .68rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); padding: 10px 14px; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 14px; border-bottom: 1px solid var(--border); font-size: .85rem; }
  .setting-row:last-child { border-bottom: none; }
  .setting-row label { font-weight: 500; color: var(--text); }
  .setting-row select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 4px 8px;
    font-size: .8rem;
    outline: none;
    cursor: pointer;
  }
  input[type=range] {
    -webkit-appearance: none;
    width: 110px;
    height: 4px;
    border-radius: 2px;
    background: var(--surface2);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  .range-val { font-size: .75rem; color: var(--muted); width: 28px; text-align: right; }
  .danger-btn { background: rgba(248,113,113,.15); border: 1px solid rgba(248,113,113,.3); color: var(--red); padding: 5px 12px; border-radius: 7px; cursor: pointer; font-size: .75rem; font-weight: 700; letter-spacing: .04em; transition: all .15s; }
  .danger-btn:hover { background: rgba(248,113,113,.25); }
  .warn-btn { background: rgba(251,191,36,.12); border: 1px solid rgba(251,191,36,.3); color: var(--yellow); padding: 5px 12px; border-radius: 7px; cursor: pointer; font-size: .75rem; font-weight: 700; letter-spacing: .04em; transition: all .15s; }
  .warn-btn:hover { background: rgba(251,191,36,.22); }

  /* ── タグ ── */
  .tag-filter-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    overflow-x: auto;
    padding-bottom: 2px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tag-filter-bar::-webkit-scrollbar { display: none; }
  .tag-chip {
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .05em;
    cursor: pointer;
    color: var(--muted);
    transition: all .15s;
    white-space: nowrap;
  }
  .tag-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(129,140,248,.1); }
  .tag-badge {
    display: inline-block;
    font-size: .65rem;
    font-weight: 700;
    letter-spacing: .06em;
    padding: 2px 7px;
    border-radius: 4px;
    background: rgba(129,140,248,.15);
    color: var(--accent);
    text-transform: uppercase;
  }
  .tag-select-wrap {
    margin-bottom: 14px;
  }
  .tag-select-wrap label { display: block; font-size: .72rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .tag-row { display: flex; gap: 6px; }
  .tag-row input, .tag-row select {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: .88rem;
    font-family: inherit;
    color: var(--text);
    outline: none;
  }
  .tag-row input:focus, .tag-row select:focus { border-color: var(--accent); }

  @media (max-width: 480px) {
    .card-text { font-size: 1rem; }
    .mode-btn { font-size: .65rem; padding: 7px 2px; }
    .fb-btn { font-size: .7rem; }
  }

  /* ── SVGアイコン用インライン ── */
  .icon { display: inline-block; line-height: 1; }

  /* ── トグルスイッチ ── */
  .toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; flex-shrink: 0; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-slider {
    position: absolute; cursor: pointer; inset: 0;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 24px; transition: .2s;
  }
  .toggle-slider:before {
    position: absolute; content: ''; height: 18px; width: 18px;
    left: 2px; bottom: 2px; background: var(--muted);
    border-radius: 50%; transition: .2s;
  }
  input:checked + .toggle-slider { background: var(--accent2); border-color: var(--accent2); }
  input:checked + .toggle-slider:before { transform: translateX(20px); background: white; }

  /* ── スピードモード ── */
  .speed-timer-wrap {
    height: 5px; border-radius: 3px;
    background: var(--surface2); margin-bottom: 10px; overflow: hidden;
  }
  .speed-timer-bar {
    height: 100%; border-radius: 3px; width: 100%;
    background: linear-gradient(90deg, var(--red) 0%, var(--yellow) 50%, var(--green) 100%);
    background-size: 200% 100%; background-position: right center;
  }
  .speed-fb-bar { display: flex; gap: 8px; }
  .speed-fb-btn {
    flex: 1; border-radius: 10px; padding: 14px 8px;
    font-size: .8rem; font-weight: 700; letter-spacing: .05em;
    cursor: pointer; border: 1px solid var(--border);
    background: var(--surface); color: var(--sub);
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; transition: all .18s; text-transform: uppercase;
  }
  .speed-fb-btn.fast:hover { border-color: var(--green); color: var(--green); background: var(--green-bg); }
  .speed-fb-btn.slow:hover { border-color: var(--yellow); color: var(--yellow); background: var(--yellow-bg); }

  /* ── 音声ファースト カードプレースホルダー ── */
  .af-placeholder {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .af-pulse {
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(129,140,248,.15);
    border: 2px solid rgba(129,140,248,.5);
    animation: af-pulse 1.6s ease-in-out infinite;
  }
  @keyframes af-pulse {
    0%, 100% { transform: scale(1); opacity: .7; box-shadow: 0 0 0 0 rgba(129,140,248,.3); }
    50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 0 10px rgba(129,140,248,0); }
  }
  .af-sub {
    font-size: .7rem; color: var(--muted);
    letter-spacing: .06em; text-align: center; line-height: 1.5;
  }
  .af-tap-hint {
    font-size: .65rem; color: rgba(129,140,248,.6);
    letter-spacing: .08em; text-transform: uppercase;
    border: 1px solid rgba(129,140,248,.25);
    padding: 3px 10px; border-radius: 20px;
    background: rgba(129,140,248,.08);
  }
</style>
</head>
<body>

<header>
  <span class="header-title">English Trainer</span>
  <button onclick="manualSync()" id="sync-btn" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:white;padding:5px 12px;border-radius:7px;font-size:.72rem;font-weight:700;letter-spacing:.06em;cursor:pointer;">同期</button>
  <span id="sync-status" style="font-size:.68rem;letter-spacing:.05em;color:rgba(255,255,255,.5);min-width:52px;text-align:right;"></span>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="showPage('practice',this)">練習</button>
    <button class="tab-btn" onclick="showPage('list',this)">リスト</button>
    <button class="tab-btn" onclick="showPage('settings',this)">設定</button>
  </div>
</header>

<!-- ── 練習ページ ── -->
<div class="page active" id="page-practice">
  <div id="empty-practice" class="empty" style="display:none">
    <div class="empty-icon">—</div>
    <p>スクリプトが登録されていません<br>「リスト」タブから追加してください</p>
  </div>
  <div id="empty-speed" class="empty" style="display:none">
    <div class="empty-icon">—</div>
    <p>スピードモードの対象カードがありません<br>先に通常モードで「覚えた」または「うろ覚え」を<br>付けてください</p>
  </div>

  <div id="practice-content">
    <div class="tag-filter-bar" id="practice-tag-bar"></div>
    <div class="mode-bar">
      <button class="mode-btn active" id="mode-seq"   onclick="setMode('seq')">順番</button>

  bar.innerHTML = getAllTags().map(t => `
    <button class="tag-chip ${t === currentTag ? 'active' : ''}" onclick="(${onSelect.toString()})('${t}')">${t}</button>
  `).join('');
}

function setPracticeTag(tag) {
  practiceTag = tag;
  renderTagBar('practice-tag-bar', practiceTag, setPracticeTag);
  buildPlayOrder();
  renderCard();
}

function setListTag(tag) {
  listTag = tag;
  renderTagBar('list-tag-bar', listTag, setListTag);
  renderList();
}

function onTagSelectChange() {
  const sel = document.getElementById('input-tag-select');
  const custom = document.getElementById('input-tag-custom');
  custom.style.display = sel.value === '__new__' ? 'block' : 'none';
}

function populateTagSelect(currentTag) {
  const sel = document.getElementById('input-tag-select');
  const tags = getAllTags().filter(t => t !== 'すべて');
  sel.innerHTML = '<option value="">タグなし</option>' +
    tags.map(t => `<option value="${t}" ${t === currentTag ? 'selected' : ''}>${t}</option>`).join('') +
    '<option value="__new__">＋ 新しいタグを作成</option>';
  document.getElementById('input-tag-custom').style.display = 'none';
}

function diffScore(s) {
  const sc = s.score;
  return sc.ng * 3 + sc.so - sc.ok * 2;
}
function dueScore(s, now) {
  const sc = s.score;
  if (!sc.lastReviewed) return Infinity;
  return (now - sc.lastReviewed) / 3600000 / sc.interval;
}
function dominantResult(s) {
  const { ok, so, ng } = s.score;
  if (!ok && !so && !ng) return 'none';
  if (ng >= so && ng >= ok) return 'ng';
  if (so >= ok) return 'so';
  return 'ok';
}

function buildPlayOrder() {
  if (!scripts.length) { playOrder = []; return; }
  let idx = scripts
    .map((_, i) => i)
    .filter(i => practiceTag === 'すべて' || scripts[i].tag === practiceTag);
  if (settings.speedMode) {
    idx = idx.filter(i => { const d = dominantResult(scripts[i]); return d === 'ok' || d === 'so'; });
  }
  if (mode === 'seq') {
    playOrder = idx;
  } else if (mode === 'rand') {
    playOrder = [...idx];
    for (let i = playOrder.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [playOrder[i], playOrder[j]] = [playOrder[j], playOrder[i]];
    }
  } else if (mode === 'hard') {
    playOrder = [...idx].sort((a, b) => diffScore(scripts[b]) - diffScore(scripts[a]));
  } else {
    const now = Date.now();
    playOrder = [...idx].sort((a, b) => dueScore(scripts[b], now) - dueScore(scripts[a], now));
  }
  currentPos = 0;
}

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'practice') { renderTagBar('practice-tag-bar', practiceTag, setPracticeTag); renderCard(); }
  if (name === 'list') { renderTagBar('list-tag-bar', listTag, setListTag); renderList(); }
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mode-' + m).classList.add('active');
  buildPlayOrder();
  renderCard();
}

function renderCard() {
  clearSpeedTimer();
  const content    = document.getElementById('practice-content');
  const empty      = document.getElementById('empty-practice');
  const emptySpeed = document.getElementById('empty-speed');

  if (!scripts.length) {
    content.style.display='none'; empty.style.display='block'; emptySpeed.style.display='none'; return;
  }
  if (!playOrder.length) buildPlayOrder();
  if (!playOrder.length) {
    content.style.display='none'; empty.style.display='none'; emptySpeed.style.display='block'; return;
  }
  content.style.display='block'; empty.style.display='none'; emptySpeed.style.display='none';

  if (currentPos >= playOrder.length) currentPos = 0;
  const s = scripts[playOrder[currentPos]];
  document.getElementById('card-en').textContent = s.en;
  document.getElementById('card-ja').textContent = s.ja || '（日本語訳なし）';
  document.getElementById('card-counter').textContent = `${currentPos + 1} / ${playOrder.length}`;
  const pct = playOrder.length > 1 ? (currentPos / (playOrder.length - 1)) * 100 : 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('flip-card').classList.remove('flipped');

  // UIリセット
  document.getElementById('af-placeholder').style.display = 'none';
  document.getElementById('card-ja').style.visibility = 'visible';
  document.getElementById('front-label').style.visibility = 'visible';
  document.getElementById('speed-timer-wrap').style.display = 'none';
  document.getElementById('speed-feedback-wrap').style.display = 'none';
  document.getElementById('normal-feedback-wrap').style.display = 'block';

  if (settings.speedMode) {
    document.getElementById('front-hint').textContent = '声に出してからタップで答えを確認';
    document.getElementById('normal-feedback-wrap').style.display = 'none';
    document.getElementById('speed-timer-wrap').style.display = 'block';
    startSpeedTimer();
  } else if (settings.audioFirst) {
    audioFirstStage = 0;
    document.getElementById('af-placeholder').style.display = 'flex';
    document.getElementById('card-ja').style.visibility = 'hidden';
    document.getElementById('front-label').style.visibility = 'hidden';
    document.getElementById('front-hint').textContent = 'タップで日本語を確認';
    setTimeout(() => speak(), 120);
  } else {
    document.getElementById('front-hint').textContent = 'タップで英語を表示';
  }
}

function flipCard() {
  if (settings.speedMode) {
    const card = document.getElementById('flip-card');
    if (!card.classList.contains('flipped')) {
      clearSpeedTimer();
      card.classList.add('flipped');
      document.getElementById('speed-timer-wrap').style.display = 'none';
      document.getElementById('speed-feedback-wrap').style.display = 'block';
    }
    return;
  }
  if (settings.audioFirst) {
    if (audioFirstStage === 0) {
      // 1回目タップ: 日本語を表示
      audioFirstStage = 1;
      document.getElementById('af-placeholder').style.display = 'none';
      document.getElementById('card-ja').style.visibility = 'visible';
      document.getElementById('front-label').style.visibility = 'visible';
      document.getElementById('front-hint').textContent = 'タップで英語を表示';
    } else if (audioFirstStage === 1) {
      // 2回目タップ: 英語を表示（フリップ）
      audioFirstStage = 2;
      document.getElementById('flip-card').classList.add('flipped');
    } else {
      // 3回目タップ: 表に戻る
      audioFirstStage = 0;
      document.getElementById('flip-card').classList.remove('flipped');
      document.getElementById('af-placeholder').style.display = 'flex';
      document.getElementById('card-ja').style.visibility = 'hidden';
      document.getElementById('front-label').style.visibility = 'hidden';
      document.getElementById('front-hint').textContent = 'タップで日本語を確認';
    }
  } else {
    document.getElementById('flip-card').classList.toggle('flipped');
  }
}

function toggleAudioFirst() {
  settings.audioFirst = document.getElementById('audio-first-toggle').checked;
  localStorage.setItem('eng_settings', JSON.stringify(settings));
  renderCard();
}

function startSpeedTimer() {
  const bar  = document.getElementById('speed-timer-bar');
  const secs = parseFloat(settings.speedSecs);
  bar.style.transition = 'none';
  bar.style.width = '100%';
  bar.getBoundingClientRect(); // reflow
  bar.style.transition = `width ${secs}s linear`;
  bar.style.width = '0%';
  speedTimer = setTimeout(() => {
    speedTimer = null;
    document.getElementById('flip-card').classList.add('flipped');
    document.getElementById('speed-timer-wrap').style.display = 'none';
    document.getElementById('speed-feedback-wrap').style.display = 'block';
  }, secs * 1000);
}

function clearSpeedTimer() {
  if (speedTimer) { clearTimeout(speedTimer); speedTimer = null; }
  const bar = document.getElementById('speed-timer-bar');
  if (bar) { bar.style.transition = 'none'; bar.style.width = '100%'; }
}

function recordSpeedFeedback(fast) {
  if (!playOrder.length) return;
  const sc = scripts[playOrder[currentPos]].score;
  sc.lastReviewed = Date.now();
  if (fast) {
    sc.ok++;
    sc.fast = (sc.fast||0) + 1;
    sc.interval = Math.min(sc.interval * 2.5, 720);
  } else {
    sc.so++;
    sc.slow = (sc.slow||0) + 1;
    sc.interval = Math.max(sc.interval * 0.5, 6);
  }
  persist();
  const card = document.getElementById('flip-card');
  card.style.transition = 'opacity .15s';
  card.style.opacity = '0';
  setTimeout(() => { card.style.opacity='1'; card.style.transition=''; nextCard(); }, 160);
}

function toggleSpeedMode() {
  settings.speedMode = document.getElementById('speed-mode-toggle').checked;
  localStorage.setItem('eng_settings', JSON.stringify(settings));
  buildPlayOrder();
  renderCard();
}

function updateSpeedSecs() {
  settings.speedSecs = parseFloat(document.getElementById('speed-secs').value);
  document.getElementById('speed-secs-val').textContent = settings.speedSecs.toFixed(1);
  localStorage.setItem('eng_settings', JSON.stringify(settings));
}

function updateDefaultScripts() {
  const storedOld = localStorage.getItem('eng_known_default_en');
  const oldDefaultEn = storedOld ? new Set(JSON.parse(storedOld)) : LEGACY_DEFAULT_EN;

  // 削除対象: 旧既定セットに含まれ、新既定セットにない
  const toDelete = scripts.filter(s => oldDefaultEn.has(s.en) && !NEW_DEFAULT_EN.has(s.en));

  if (toDelete.length > 0) {
    const names = toDelete.map(s => `・${s.en}`).join('\n');
    const ok = confirm(
      `${toDelete.length}件のカードが新しいリストに含まれないため削除されます。\n\n${names}\n\n続けますか？`
    );
    if (!ok) return;
  }

  // 削除
  scripts = scripts.filter(s => !(oldDefaultEn.has(s.en) && !NEW_DEFAULT_EN.has(s.en)));

  // 既存カードのja/tagを新DEFAULT_SCRIPTSで更新（スコアは保持）
  const byEn = new Map(scripts.map(s => [s.en, s]));
  DEFAULT_SCRIPTS.forEach(d => {
    if (byEn.has(d.en)) {
      const s = byEn.get(d.en);
      s.ja  = d.ja;
      s.tag = d.tag;
    } else {
      scripts.push({ ...d, score: { ok:0, so:0, ng:0, lastReviewed:null, interval:24 } });
    }
  });

  localStorage.setItem('eng_known_default_en', JSON.stringify([...NEW_DEFAULT_EN]));
  persist();
  buildPlayOrder();
  renderTagBar('practice-tag-bar', practiceTag, setPracticeTag);
  renderTagBar('list-tag-bar', listTag, setListTag);
  renderCard();
  if (document.getElementById('page-list').classList.contains('active')) renderList();

  const added = DEFAULT_SCRIPTS.filter(d => !byEn.has(d.en)).length;
  alert(`更新完了\n追加: ${added}件 / 削除: ${toDelete.length}件`);
}
function prevCard() { if (!playOrder.length) return; currentPos = (currentPos - 1 + playOrder.length) % playOrder.length; renderCard(); }
function nextCard() { if (!playOrder.length) return; currentPos = (currentPos + 1) % playOrder.length; renderCard(); }

function recordFeedback(type) {
  if (!playOrder.length) return;
  const sc = scripts[playOrder[currentPos]].score;
  sc[type]++;
  sc.lastReviewed = Date.now();
  if (type === 'ok') sc.interval = Math.min(sc.interval * 2.5, 720);
  else if (type === 'so') sc.interval = Math.max(sc.interval * 1.2, 12);
  else sc.interval = 1;
  persist();
  const card = document.getElementById('flip-card');
  card.style.transition = 'opacity .15s';
  card.style.opacity = '0';
  setTimeout(() => { card.style.opacity='1'; card.style.transition=''; nextCard(); }, 160);
}

function extractEnglish(text) {
  return text.replace(/[　-鿿豈-﫿＀-￯]+/g, ' ').replace(/_+/g, ' ').replace(/\s+/g, ' ').trim();
}
function speak() {
  if (!playOrder.length) return;
  const enOnly = extractEnglish(scripts[playOrder[currentPos]].en);
  const utter = new SpeechSynthesisUtterance(enOnly);
  utter.lang = 'en-US';
  utter.rate = parseFloat(settings.rate);
  utter.pitch = parseFloat(settings.pitch);
  const voices = speechSynthesis.getVoices();
  const v = voices.find(v => v.voiceURI === settings.voiceURI) || voices.find(v => v.lang.startsWith('en'));
  if (v) utter.voice = v;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

function setListFilter(f, btn) {
  listFilter_current = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const el = document.getElementById('script-list');
  if (!scripts.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">—</div><p>まだスクリプトがありません</p></div>';
    return;
  }
  const filtered = scripts.map((s, i) => ({ s, i })).filter(({ s }) => {
    if (listTag !== 'すべて' && s.tag !== listTag) return false;
    if (listFilter_current === 'all')  return true;
    if (listFilter_current === 'none') return dominantResult(s) === 'none';
    return dominantResult(s) === listFilter_current;
  });
  if (!filtered.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">—</div><p>該当するスクリプトがありません</p></div>';
    return;
  }
  el.innerHTML = filtered.map(({ s, i }) => {
    const sc = s.score;
    const hasScore = sc.ok + sc.so + sc.ng > 0;
    const dom = dominantResult(s);
    const barClass = { ok:'easy', so:'mid', ng:'hard', none:'none' }[dom];
    const fast = sc.fast||0, slow = sc.slow||0;
    const speedBadges = (fast + slow > 0)
      ? `<span class="score-badge fast">⚡ ${fast}</span><span class="score-badge slow">◷ ${slow}</span>`
      : '';
    const badges = (hasScore
      ? `<span class="score-badge ok">✓ ${sc.ok}</span><span class="score-badge so">△ ${sc.so}</span><span class="score-badge ng">✕ ${sc.ng}</span>`
      : `<span class="score-badge none">未回答</span>`) + speedBadges;
    return `
      <div class="script-item">
        <div class="script-item-top">
          <div class="diff-bar ${barClass}"></div>
          <div class="script-item-body">
            <div class="script-en">${esc(s.en)}</div>
            <div class="script-ja">${esc(s.ja||'─')}</div>
            ${s.tag ? `<div style="margin-top:4px"><span class="tag-badge">${esc(s.tag)}</span></div>` : ''}
          </div>
          <div class="item-actions">
            <button class="icon-btn" onclick="openModal(${i})">編</button>
            <button class="icon-btn del" onclick="deleteScript(${i})">削</button>
          </div>
        </div>
        <div class="score-row">${badges}</div>
      </div>`;
  }).join('');
}

function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function openModal(idx=null) {
  editingIdx = idx;
  document.getElementById('modal-title').textContent = idx===null ? 'スクリプトを追加' : 'スクリプトを編集';
  document.getElementById('input-en').value = idx!==null ? scripts[idx].en : '';
  document.getElementById('input-ja').value = idx!==null ? scripts[idx].ja : '';
  populateTagSelect(idx !== null ? scripts[idx].tag : '');
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('input-en').focus(), 100);
}
function closeModal() { document.getElementById('modal').classList.remove('open'); editingIdx=null; }

function saveScript() {
  const en = document.getElementById('input-en').value.trim();
  const ja = document.getElementById('input-ja').value.trim();
  const selVal = document.getElementById('input-tag-select').value;
  const tag = selVal === '__new__'
    ? document.getElementById('input-tag-custom').value.trim()
    : selVal;
  if (!en) { alert('英語テキストを入力してください'); return; }
  if (editingIdx!==null) scripts[editingIdx] = { ...scripts[editingIdx], en, ja, tag };
  else scripts.push({ en, ja, tag, score: { ok:0, so:0, ng:0, lastReviewed:null, interval:24 } });
  persist(); buildPlayOrder(); closeModal();
  renderTagBar('list-tag-bar', listTag, setListTag);
  renderList();
}

function deleteScript(idx) {
  if (!confirm('このスクリプトを削除しますか？')) return;
  scripts.splice(idx, 1);
  persist(); buildPlayOrder(); renderList();
}
function clearAll() {
  if (!confirm('すべてのスクリプトを削除しますか？')) return;
  scripts=[]; persist(); buildPlayOrder(); renderList();
}
function resetScores() {
  if (!confirm('フィードバック履歴をリセットしますか？')) return;
  scripts = scripts.map(s => ({ ...s, score:{ ok:0, so:0, ng:0, lastReviewed:null, interval:24 } }));
  persist();
}
// ── Google Sheets 同期 ──
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwCBRFRzgCIHrHGmBmKCv9QmTntl8GfBFhQTtMvu5SgCAbjPr9yHHojilph1RSvYow/exec';

function setSyncStatus(msg, color) {
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  el.style.color = color || 'rgba(255,255,255,.5)';
}

async function manualSync() {
  const btn = document.getElementById('sync-btn');
  btn.disabled = true;

  // 1. クラウドから取得
  setSyncStatus('取得中...', 'rgba(255,255,255,.6)');
  let cloudData = {};
  try {
    const res = await fetch(GAS_URL);
    cloudData = await res.json();
  } catch(e) {
    setSyncStatus('失敗', '#f87171');
    btn.disabled = false;
    return;
  }

  // 2. ローカルとクラウドをマージ（両デバイスの記録を合算）
  scripts.forEach(s => {
    const c = cloudData[s.en];
    if (!c) return;
    s.score.ok = Math.max(s.score.ok, c.ok||0);
    s.score.so = Math.max(s.score.so, c.so||0);
    s.score.ng = Math.max(s.score.ng, c.ng||0);
    s.score.fast = Math.max(s.score.fast||0, c.fast||0);
    s.score.slow = Math.max(s.score.slow||0, c.slow||0);
    s.score.lastReviewed = Math.max(s.score.lastReviewed||0, c.lastReviewed||0) || null;
    s.score.interval = Math.max(s.score.interval||24, c.interval||24);
  });
  persist();

  // 3. マージ済みデータをクラウドに保存
  setSyncStatus('保存中...', 'rgba(255,255,255,.6)');
  try {
    const payload = {};
    scripts.forEach(s => { payload[s.en] = s.score; });
    await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
    renderCard();
    if (document.getElementById('page-list').classList.contains('active')) renderList();
    setSyncStatus('完了', '#34d399');
    setTimeout(() => setSyncStatus(''), 3000);
  } catch(e) {
    setSyncStatus('失敗', '#f87171');
  }
  btn.disabled = false;
}

function persist() { localStorage.setItem('eng_scripts', JSON.stringify(scripts)); }

function updateRate()  { settings.rate=document.getElementById('rate').value; document.getElementById('rate-val').textContent=parseFloat(settings.rate).toFixed(1); saveSettings(); }
function updatePitch() { settings.pitch=document.getElementById('pitch').value; document.getElementById('pitch-val').textContent=parseFloat(settings.pitch).toFixed(1); saveSettings(); }
function saveSettings() { settings.voiceURI=document.getElementById('voice-select').value; localStorage.setItem('eng_settings',JSON.stringify(settings)); }

function populateVoices() {
  const voices = speechSynthesis.getVoices();
  const sel = document.getElementById('voice-select');
  sel.innerHTML = '';
  voices.filter(v => v.lang.startsWith('en')).forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.voiceURI;
    opt.textContent = `${v.name} (${v.lang})`;
    if (v.voiceURI === settings.voiceURI) opt.selected = true;
    sel.appendChild(opt);
  });
}

document.getElementById('rate').value  = settings.rate;
document.getElementById('pitch').value = settings.pitch;
document.getElementById('rate-val').textContent  = parseFloat(settings.rate).toFixed(1);
document.getElementById('pitch-val').textContent = parseFloat(settings.pitch).toFixed(1);
document.getElementById('audio-first-toggle').checked  = !!settings.audioFirst;
document.getElementById('speed-mode-toggle').checked   = !!settings.speedMode;
document.getElementById('speed-secs').value            = settings.speedSecs;
document.getElementById('speed-secs-val').textContent  = parseFloat(settings.speedSecs).toFixed(1);
speechSynthesis.onvoiceschanged = populateVoices;
populateVoices();
document.getElementById('modal').addEventListener('click', e => { if (e.target===e.currentTarget) closeModal(); });

buildPlayOrder();
renderTagBar('practice-tag-bar', practiceTag, setPracticeTag);
renderCard();
manualSync();
